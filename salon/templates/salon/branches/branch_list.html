{% extends "salon/base.html" %}

{% block title %}Філії — Перукарня CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="bi bi-building"></i> Філії</h1>
    <a href="{% url 'salon:branch_create' %}"
       class="btn btn-success">
        <i class="bi bi-plus-lg"></i> Додати філію
    </a>
</div>

<div class="row g-4">
    {% for b in branches %}
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="bi bi-building"></i> {{ b.name }}
                </h5>
                <p class="card-text">
                    <i class="bi bi-geo-alt"></i>
                    {{ b.address }}<br>
                    <i class="bi bi-telephone"></i>
                    {{ b.contact_phone }}
                </p>
            </div>
            <div class="card-footer">
                <a href="{% url 'salon:branch_edit' b.pk %}"
                   class="btn btn-sm btn-outline-warning">
                    <i class="bi bi-pencil"></i> Редагувати
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12">
        <p class="text-center text-muted">Філій ще немає</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
