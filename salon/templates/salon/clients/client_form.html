{% extends "salon/base.html" %}

{% block title %}{{ title }} — Перукарня CRM{% endblock %}

{% block content %}
<h1 class="mb-4">
    <i class="bi bi-person-plus"></i> {{ title }}
</h1>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}"
                                   class="form-label">
                                {{ field.label }}
                            </label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="invalid-feedback d-block">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Зберегти
                    </button>
                    <a href="{% url 'salon:client_list' %}"
                       class="btn btn-secondary">
                        Скасувати
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
